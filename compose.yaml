services:
  game:
    build:
      context: .
      target: development
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app:Z
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    command: sh -lc "pnpm install --frozen-lockfile=false && pnpm assets:extract && pnpm dev"

  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    network_mode: host
    volumes:
      - .:/app:Z
      - e2e_node_modules:/app/node_modules
    environment:
      HOME: /tmp
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    command: sh -lc "corepack enable && corepack prepare pnpm@11.13.0 --activate && pnpm install --frozen-lockfile=false && pnpm test:e2e"
    profiles: ["test"]

volumes:
  node_modules:
  e2e_node_modules:
  pnpm_store:
