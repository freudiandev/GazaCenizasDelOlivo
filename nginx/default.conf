server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(.+)/$ {
        try_files /$1.html /$1/index.html =404;
    }

    location / {
        try_files $uri.html $uri/index.html $uri =404;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
